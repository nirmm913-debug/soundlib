<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>所持作品一覧</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  --bg: #0e1a22;
  --bg2: #12202b;
  --bg3: #172a36;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.07);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-glow: rgba(201,168,76,0.08);
  --text: #e8e0d4;
  --text-dim: rgba(232,224,212,0.7);
  --text-muted: rgba(232,224,212,0.5);
  --fav-bg: rgba(201,168,76,0.06);
  --fav-border: rgba(201,168,76,0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-weight: 300;
}

/* Subtle noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(14,26,34,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}

.header-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 18px 0 14px;
}

.header-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.05rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  opacity: 0.9;
}

.header-title span {
  font-style: italic;
  opacity: 0.6;
  font-size: 0.8em;
  margin-left: 8px;
  letter-spacing: 0.1em;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 13px;
  height: 13px;
  color: var(--text-muted);
  pointer-events: none;
}

#q {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.82rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.03em;
}

#q:focus {
  border-color: rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.04);
}

#q::placeholder { color: var(--text-muted); }

.sort-btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.75rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.05em;
  transition: all 0.2s;
}

.sort-btn:hover { background: var(--surface); color: var(--text); }
.sort-btn.on {
  background: var(--gold-dim);
  border-color: rgba(201,168,76,0.35);
  color: var(--gold);
}

/* Main */
main {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 24px 80px;
  position: relative;
  z-index: 1;
}

/* Tabs */
.tabs-wrap {
  padding: 20px 0 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.tabs {
  display: flex;
  gap: 0;
}

.tab {
  padding: 6px 20px 8px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-dim);
  font-size: 0.78rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.2s;
  margin-bottom: -1px;
}

.tab:hover { color: var(--text); }
.tab.on {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.stats {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* Voice actor card */
.vc {
  margin-bottom: 6px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: border-color 0.2s;
}

.vc:hover { border-color: rgba(255,255,255,0.1); }

.vc.fav {
  background: var(--fav-bg);
  border-color: var(--fav-border);
}

.vc.fav:hover { border-color: rgba(201,168,76,0.3); }

.vh {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  gap: 12px;
  transition: background 0.15s;
}

.vh:hover { background: var(--surface-hover); }
.fav .vh:hover { background: rgba(201,168,76,0.08); }

.vn {
  font-size: 0.88rem;
  font-weight: 400;
  color: var(--text);
  flex: 1;
  letter-spacing: 0.04em;
}

.fav .vn { color: rgba(232,224,212,0.95); }

.vm {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.vk {
  font-size: 0.72rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 20px;
}

.fav .vk {
  color: rgba(201,168,76,0.7);
  border-color: rgba(201,168,76,0.2);
}

.fav-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
  flex-shrink: 0;
}

.ch {
  width: 13px;
  height: 13px;
  color: var(--text-muted);
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), color 0.2s;
  flex-shrink: 0;
}

.ch.op {
  transform: rotate(180deg);
  color: var(--gold);
}

/* Works list */
.cl {
  border-top: 1px solid var(--border);
  display: none;
  padding: 4px 0;
}

.cl.op { display: block; }

.ci {
  padding: 7px 16px 7px 28px;
  font-size: 0.76rem;
  color: var(--text-dim);
  line-height: 1.6;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: color 0.15s, background 0.15s;
  letter-spacing: 0.02em;
}

.ci:last-child { border-bottom: none; }

.ci:hover {
  color: var(--text);
  background: rgba(255,255,255,0.02);
}

.ci::before {
  content: '';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text-muted);
}

.fav .ci::before { background: rgba(201,168,76,0.4); }

/* Highlight */
mark {
  background: rgba(201,168,76,0.2);
  color: var(--gold);
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}

/* No results */
.nr {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* Subtle gold line accent on fav cards */
.vc.fav {
  position: relative;
}
.vc.fav::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  opacity: 0.5;
  border-radius: 10px 0 0 10px;
}

/* Animate in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.vc {
  animation: fadeUp 0.3s ease backwards;
}
</style>
</head>

function setSort(m){

function setTab(t){

  document.getElementById('tFav').className='tab'+(t==='fav'?' on':'');
  render();
}
function hl(t,q){
  if(!q)return t;
  var i=t.toLowerCase().indexOf(q.toLowerCase());
  if(i===-1)return t;
  return t.slice(0,i)+'<mark>'+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
}
function render(){
  var q=document.getElementById('q').value.trim();
  var ql=q.toLowerCase();
  var MULTI='◆複数声優作品◆';
  var src=tab==='fav'?FAVS.map(function(n){for(var i=0;i<DATA.length;i++){if(DATA[i].name===n)return DATA[i];}return null;}).filter(function(v){return v!==null;}):DATA;
  var d=src.map(function(v){
    var nm=v.name.toLowerCase().indexOf(ql)!==-1;
    var f=ql?v.cds.filter(function(c){return c.toLowerCase().indexOf(ql)!==-1||nm;}):v.cds.slice();
    return{name:v.name,cds:v.cds,f:f,fav:FAVS.indexOf(v.name)!==-1};
  }).filter(function(v){return v.f.length>0;});
  if(tab==='all'){
    if(srt==='aiueo'){d.sort(function(a,b){if(a.name===MULTI)return 1;if(b.name===MULTI)return -1;return a.name.localeCompare(b.name,'ja');});}
    else{d.sort(function(a,b){if(a.name===MULTI)return 1;if(b.name===MULTI)return -1;return b.f.length-a.f.length;});}
  }

  var hc=d.reduce(function(s,v){return s+v.f.length;},0);

  }

}
function tog(id){
  var el=document.getElementById(id);
  if(!el)return;
  var op=el.classList.contains('op');

  el.classList.toggle('op',!op);
